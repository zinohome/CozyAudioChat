name: build-and-push

# 自动构建 server / client 镜像并推送到 Harbor。
# 需在仓库 Settings -> Secrets and variables -> Actions 配置：
#   HARBOR_USERNAME / HARBOR_PASSWORD
# 可选 Variables：HARBOR_REGISTRY（默认 harbor.naivehero.top:8443/video）

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "镜像标签（默认 latest）"
        required: false
        default: latest

env:
  HARBOR_HOST: harbor.naivehero.top:8443
  HARBOR_REGISTRY: ${{ vars.HARBOR_REGISTRY || 'harbor.naivehero.top:8443/video' }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [server, client]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # server 镜像很大（CUDA + torch + tensorrt），先清理 runner 磁盘避免构建中途空间耗尽
      - name: Free disk space
        if: matrix.component == 'server'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Compute image tag
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            # 仅允许镜像标签合法字符，防止注入
            SAFE_TAG=$(printf '%s' "$INPUT_TAG" | tr -cd 'A-Za-z0-9._-')
            echo "tag=${SAFE_TAG:-latest}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_HOST }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push ${{ matrix.component }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.component }}.Dockerfile
          push: true
          tags: ${{ env.HARBOR_REGISTRY }}/cozyaudiochat-${{ matrix.component }}:${{ steps.meta.outputs.tag }}
